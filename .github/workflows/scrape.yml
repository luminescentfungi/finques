name: scrape

on:
  workflow_dispatch:   # start manually from the GitHub UI — runs forever until cancelled

# Only one instance at a time. If you trigger again manually while one is
# running, the old run is cancelled and a fresh one starts.
concurrency:
  group: scrape
  cancel-in-progress: true

jobs:
  scrape:
    runs-on: ubuntu-latest
    # GitHub's hard maximum — gives ~35 days of continuous runtime.
    # The job only ends if cancelled manually or a new dispatch replaces it.
    timeout-minutes: 43200

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium --with-deps

      - name: Run scraper
        env:
          TELEGRAM_BOT_TOKEN:  ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:    ${{ secrets.TELEGRAM_CHAT_ID }}
          CONTACT_NAME:        ${{ secrets.CONTACT_NAME }}
          CONTACT_EMAIL:       ${{ secrets.CONTACT_EMAIL }}
          CONTACT_PHONE_FULL:  ${{ secrets.CONTACT_PHONE_FULL }}
          CONTACT_PHONE_LOCAL: ${{ secrets.CONTACT_PHONE_LOCAL }}
        # Infinite loop — no --max-runtime, runs until cancelled or replaced
        run: python main.py --max-price 1000 --loop --loop-interval 30

      - name: Commit updated scraped.txt
        if: always()   # commit even if the scraper step was cancelled
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add scraped.txt || true
          git diff --staged --quiet || git commit -m "chore: update scraped urls [skip ci]"
          git push || true
