name: scrape

on:
  schedule:
    # Restart every 5 hours. GitHub's hard job limit is 6h;
    # the script exits after --max-runtime 280 min (~4h40) so it always
    # finishes cleanly before the next trigger fires.
    - cron: '0 */5 * * *'
  workflow_dispatch:   # also triggerable manually from the GitHub UI

# Never more than one run at a time.
# A new trigger (scheduled or manual) cancels the in-progress run and
# starts a fresh one — scraped.txt is already up-to-date in git because
# the script commits it periodically from inside Python.
concurrency:
  group: scrape
  cancel-in-progress: true

jobs:
  scrape:
    runs-on: ubuntu-latest
    # Hard cap at 310 min — slightly above --max-runtime so GitHub only
    # intervenes if Python itself hangs completely.
    timeout-minutes: 310

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium --with-deps

      - name: Configure git (needed for in-process commits)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run scraper
        env:
          TELEGRAM_BOT_TOKEN:  ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:    ${{ secrets.TELEGRAM_CHAT_ID }}
          CONTACT_NAME:        ${{ secrets.CONTACT_NAME }}
          CONTACT_EMAIL:       ${{ secrets.CONTACT_EMAIL }}
          CONTACT_PHONE_FULL:  ${{ secrets.CONTACT_PHONE_FULL }}
          CONTACT_PHONE_LOCAL: ${{ secrets.CONTACT_PHONE_LOCAL }}
        # --max-runtime 280: exits after ~4h40, well before the 5h re-trigger
        # and well inside the 310-min job timeout.
        # scraped.txt is committed to git every --commit-interval iterations
        # from inside Python so progress is never lost on cancellation.
        run: python main.py --max-price 1350 --loop --loop-interval 30 --max-runtime 280

      - name: Final commit of scraped.txt
        if: always()
        run: |
          git add scraped.txt || true
          git diff --staged --quiet || git commit -m "chore: update scraped urls [skip ci]"
          git push || true
